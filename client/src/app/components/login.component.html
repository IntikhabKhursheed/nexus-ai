<div class="min-h-screen bg-gray-900 flex items-center justify-center px-4">
  <div class="max-w-md w-full">
    <div class="bg-gray-800 rounded-xl shadow-2xl border border-gray-700">
      <div class="p-8">
        <div class="text-center mb-8">
          <h1 class="text-3xl font-bold text-white mb-2">Nexus AI</h1>
          <p class="text-gray-400">Task Management System</p>
        </div>

        <div class="mb-6">
          <div class="flex bg-gray-700 rounded-lg p-1">
            <button
              [class]="['flex-1 py-2 px-4 rounded-md text-sm font-medium transition-all', isLoginMode ? 'bg-blue-600 text-white' : 'text-gray-300 hover:text-white']"
              (click)="onSwitchMode()"
            >
              Login
            </button>
            <button
              [class]="['flex-1 py-2 px-4 rounded-md text-sm font-medium transition-all', !isLoginMode ? 'bg-blue-600 text-white' : 'text-gray-300 hover:text-white']"
              (click)="onSwitchMode()"
            >
              Register
            </button>
          </div>
        </div>

        <form (ngSubmit)="onSubmit()">
          <div *ngIf="!isLoginMode" class="mb-4">
            <label class="block text-sm font-medium text-gray-300 mb-2">Username</label>
            <input
              type="text"
              [(ngModel)]="registerData.username"
              name="username"
              class="w-full px-4 py-3 bg-gray-700 border border-gray-600 rounded-lg text-white placeholder-gray-400 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent"
              placeholder="Enter your username"
              required
            />
          </div>

          <div class="mb-4">
            <label class="block text-sm font-medium text-gray-300 mb-2">Email</label>
            <input
              type="email"
              [ngModel]="isLoginMode ? loginData.email : registerData.email"
              (ngModelChange)="isLoginMode ? loginData.email = $event : registerData.email = $event"
              [name]="isLoginMode ? 'email' : 'email'"
              class="w-full px-4 py-3 bg-gray-700 border border-gray-600 rounded-lg text-white placeholder-gray-400 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent"
              placeholder="Enter your email"
              required
            />
          </div>

          <div class="mb-6">
            <label class="block text-sm font-medium text-gray-300 mb-2">Password</label>
            <input
              type="password"
              [ngModel]="isLoginMode ? loginData.password : registerData.password"
              (ngModelChange)="isLoginMode ? loginData.password = $event : registerData.password = $event"
              [name]="isLoginMode ? 'password' : 'password'"
              class="w-full px-4 py-3 bg-gray-700 border border-gray-600 rounded-lg text-white placeholder-gray-400 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent"
              placeholder="Enter your password"
              required
            />
          </div>

          <div *ngIf="error" class="mb-4 p-3 bg-red-900/50 border border-red-700 rounded-lg">
            <p class="text-red-300 text-sm">{{ error }}</p>
          </div>

          <div *ngIf="success" class="mb-4 p-3 bg-green-900/50 border border-green-700 rounded-lg">
            <p class="text-green-300 text-sm">{{ success }}</p>
          </div>

          <button
            type="submit"
            [disabled]="isLoading"
            class="w-full bg-blue-600 hover:bg-blue-700 disabled:bg-gray-600 text-white font-medium py-3 px-4 rounded-lg transition duration-200 flex items-center justify-center"
          >
            <span *ngIf="!isLoading">{{ isLoginMode ? 'Sign In' : 'Create Account' }}</span>
            <span *ngIf="isLoading" class="animate-pulse">Loading...</span>
          </button>
        </form>
      </div>
    </div>
  </div>
</div>
